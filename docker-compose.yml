services:
  yolo_server:
    build: .
    container_name: yolo_server
    shm_size: "16g"
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8891:8891"
    tty: true
    stdin_open: true
    entrypoint: uvicorn src.main:app --host 0.0.0.0 --port 8891 --reload
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - api_gateway

networks:
  api_gateway:
    external: true
